<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QQMusic Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <!-- Header: title-artist / album -->
        <div class="header">
            <div class="song-title" id="song-title">No music playing</div>
            <div class="song-album" id="song-album"></div>
        </div>

        <!-- Progress bar with status icon -->
        <div class="progress-section">
            <span class="status-icon" id="status-icon">▶</span>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time-info" id="time-info">00:00 / 00:00 [0.0%]</span>
        </div>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Lyrics area -->
        <div class="lyrics-area" id="lyrics-area">
            <div class="lyric-empty">...</div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <label class="toggle" title="显示/隐藏翻译">
                <input type="checkbox" id="toggle-trans" checked>
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="toggle-label">译</span>
            </label>
            <label class="toggle" title="显示/隐藏调试信息">
                <input type="checkbox" id="toggle-debug">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="toggle-label">Debug</span>
            </label>
        </div>

        <!-- Debug info -->
        <div class="debug-info" id="debug-info"></div>

        <!-- Raw data (collapsible) -->
        <details class="raw-panel">
            <summary>Raw JSON Data</summary>
            <pre id="raw-data">Waiting for data...</pre>
        </details>
    </div>

    <script src="app.js"></script>
</body>

</html>
